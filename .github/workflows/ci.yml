name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # We need both backend and frontend dependencies for tests
        pip install -r requirements-backend.txt
        pip install -r requirements-frontend.txt
        # Install test dependencies (pytest)
        pip install pytest pytest-asyncio

    - name: Download NLTK data (for humanizer tests)
      run: |
        python -c "import nltk; nltk.download('wordnet'); nltk.download('averaged_perceptron_tagger'); nltk.download('punkt')"

    - name: Run test suite
      run: |
        pytest tests/ -v
